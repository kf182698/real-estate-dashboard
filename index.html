<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>翊鼎國際廣告 · 代銷投組控制台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --page:#EBEEF3; --card:#FFFFFF; --line:#E1E5EC; --line2:#EDEFF4;
  --ink:#161A22; --mut:#626B7C; --faint:#909AAB;
  --brand:#27345E; --brand2:#36487C;
  --pos:#15795A; --posbg:#E4F1EB; --neg:#C0392B; --negbg:#F8E7E4;
  --blue:#2C6FB3; --bluebg:#E5EEF7; --amber:#B07914;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page);color:var(--ink);font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 56px}

/* header */
header{background:var(--brand);color:#fff;margin-bottom:22px}
.hd{max-width:1180px;margin:0 auto;padding:18px 20px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.htitle h1{font-size:20px;font-weight:700;letter-spacing:.5px}
.htitle p{font-size:12.5px;color:#B9C2DC;margin-top:3px}
.seg{display:flex;background:rgba(255,255,255,.10);border-radius:9px;padding:3px}
.seg button{font-family:inherit;border:0;background:transparent;color:#C5CDE3;font-size:13px;font-weight:500;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button:hover{color:#fff}
.seg button.on{background:#fff;color:var(--brand)}
.scope{font-size:11.5px;color:#9FA9C6;text-align:right;line-height:1.5}

/* kpi */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 15px}
.kpi .k{font-size:11.5px;color:var(--mut);font-weight:500;letter-spacing:.2px}
.kpi .v{font-size:23px;font-weight:700;margin-top:7px;line-height:1.05}
.kpi .u{font-size:12px;color:var(--faint);font-weight:400;margin-left:3px}
.kpi .d{font-size:11px;margin-top:5px;font-weight:500}
.up{color:var(--pos)} .dn{color:var(--neg)}

/* grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.panel h2{font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.panel h2 .sub{font-size:11.5px;color:var(--faint);font-weight:400}

/* diverging bars */
.bars{margin-top:14px}
.barrow{display:grid;grid-template-columns:118px 1fr 86px;align-items:center;gap:8px;padding:3px 0;cursor:pointer;border-radius:6px}
.barrow:hover{background:var(--line2)}
.barrow .nm{font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track{position:relative;height:17px}
.track .zero{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line)}
.bar{position:absolute;top:2px;height:13px;border-radius:3px}
.barrow .val{font-size:12px;text-align:right;font-weight:500}

/* dehua progress */
.plist{margin-top:12px;max-height:300px;overflow:auto}
.prow{padding:7px 0;border-bottom:1px solid var(--line2)}
.prow:last-child{border-bottom:0}
.ptop{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.ptop .pct{font-weight:700;color:var(--blue)}
.ptrack{height:7px;background:#EDF0F5;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--blue);border-radius:4px}
.pmeta{font-size:11px;color:var(--faint);margin-top:3px}

/* trend svg */
.trendwrap{margin-top:10px}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--mut);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%}

/* conversion */
.conv{display:flex;gap:14px;margin-top:14px}
.convcard{flex:1;background:var(--line2);border-radius:10px;padding:13px}
.convcard .cl{font-size:11.5px;color:var(--mut)}
.convcard .cv{font-size:21px;font-weight:700;margin-top:4px}
.funnel{margin-top:14px}
.fbar{height:30px;border-radius:6px;display:flex;align-items:center;padding:0 11px;color:#fff;font-size:12.5px;font-weight:500;margin-bottom:7px}

/* table */
.tablepanel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.tablehead{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.tablehead h2{font-size:14px;font-weight:700}
.tablehead .hint{font-size:11.5px;color:var(--faint)}
table{width:100%;border-collapse:collapse}
th,td{padding:9px 12px;font-size:12.5px;text-align:right;white-space:nowrap}
th{background:#F7F8FB;color:var(--mut);font-weight:500;font-size:11.5px;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left;padding-left:18px}
th.arrow::after{content:" \25BE";color:var(--brand)}
th.arrow.asc::after{content:" \25B4"}
tbody tr{border-bottom:1px solid var(--line2);cursor:pointer}
tbody tr:hover{background:#F4F7FB}
tbody tr:last-child{border-bottom:0}
.tag{font-size:10.5px;padding:2px 7px;border-radius:5px;font-weight:500}
.chip{display:inline-block;min-width:54px;text-align:center;padding:2px 6px;border-radius:5px;font-weight:500;font-size:11.5px}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(20,24,35,.42);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--card);transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1);z-index:50;overflow:auto;box-shadow:-8px 0 28px rgba(20,24,35,.16)}
.drawer.show{transform:none}
.dhd{background:var(--brand);color:#fff;padding:18px 20px;position:sticky;top:0}
.dhd .x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.14);border:0;color:#fff;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:16px;line-height:1}
.dhd h3{font-size:18px;font-weight:700}
.dhd p{font-size:12px;color:#B9C2DC;margin-top:3px}
.dbody{padding:18px 20px}
.dstat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.dstat .s{background:var(--line2);border-radius:9px;padding:11px 13px}
.dstat .sl{font-size:11px;color:var(--mut)}
.dstat .sv{font-size:17px;font-weight:700;margin-top:3px}
.dsec{font-size:12.5px;font-weight:700;margin:18px 0 9px;color:var(--ink)}
.spark{background:var(--line2);border-radius:9px;padding:14px 12px 8px}
.wkrow{display:flex;justify-content:space-between;font-size:11.5px;color:var(--mut);margin-top:8px}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}
@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.hd{flex-direction:column;align-items:stretch}.scope{text-align:left}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="htitle">
      <div style="font-size:12px;color:#B9C2DC;letter-spacing:1.5px;font-weight:500;margin-bottom:4px">翊鼎國際廣告</div>
      <h1>代銷投組控制台</h1>
      <p>逐建案業績與財務檢視 · Portfolio overview prototype</p>

    <div class="scope">翊鼎國際廣告 · 2025 每周盈虧<br>在售建案 · 損益單位：萬元</div>

<div class="wrap">

  </div>

  <div class="grid">

        <span><i class="dot" style="background:var(--brand)"></i>損益(萬元)</span>

        <span><i class="dot" style="background:var(--amber)"></i>成交</span>
      </div>
    </div>
    <div class="panel">
      <h2>來人 → 成交 <span class="sub" id="convSub"></span></h2>
      <div class="conv" id="convStats"></div>
      <div class="funnel" id="funnel"></div>
    </div>
  </div>

  <div class="tablepanel">
    <div class="tablehead">
      <h2>建案明細</h2>
      <span class="hint">點欄位排序 · 點列查看單案細節</span>
    </div>
    <div style="overflow-x:auto">
      <table id="tbl">
        <thead><tr id="thr"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dhd">
    <button class="x" onclick="closeDrawer()">&times;</button>
    <h3 id="dName"></h3>
    <p id="dMeta"></p>
  </div>
  <div class="dbody" id="dBody"></div>
</div>

const MONTHS = ["114.01","114.02","114.03","114.04"];
const fmtW = n => (n/10000).toLocaleString("zh-TW",{maximumFractionDigits:1,minimumFractionDigits:1});
const fmtN = n => Math.round(n).toLocaleString("zh-TW");

function rows(m){
  return DATA.monthly[m].map(r=>{
    const v = (DATA.visitors[m]||{})[r.project] || {};
    const sold = (r.units||0) - (r.remain_units||0);
    return {...r, sold, rate: r.units? sold/r.units : 0,
      visitors: v.visitors||0, deals: v.deals||0};
  });
}
function agg(m){
  const rs = rows(m);
  return {
    count: rs.length,
    units: rs.reduce((a,r)=>a+(r.units||0),0),
    remain: rs.reduce((a,r)=>a+(r.remain_units||0),0),
    pnl: rs.reduce((a,r)=>a+(r.month_pnl||0),0),
    visitors: rs.reduce((a,r)=>a+r.visitors,0),
    deals: rs.reduce((a,r)=>a+r.deals,0),
  };
}

function renderKpis(){
  const a=agg(cur), pm=MONTHS[MONTHS.indexOf(cur)-1], pa=pm?agg(pm):null;
  const rate=(a.units-a.remain)/a.units;
  const delta=(cur,prev,fmt)=>{ if(prev==null)return ""; const d=cur-prev; const s=d>=0?"up":"dn"; const sign=d>=0?"▲":"▼"; return `<div class="d ${s}">${sign} ${fmt(Math.abs(d))} vs ${pm}</div>`;};
  const cards=[
    {k:"在售建案",v:fmtN(a.count),u:"案",d:""},
    {k:"規劃戶數",v:fmtN(a.units),u:"戶",d:""},
    {k:"剩餘可售",v:fmtN(a.remain),u:"戶",d:pa?delta(a.remain,pa.remain,fmtN):""},

  ];
  document.getElementById("kpis").innerHTML = cards.map(c=>
    `<div class="kpi"><div class="k">${c.k}</div><div class="v num">${c.v}<span class="u">${c.u}</span></div>${c.d}</div>`).join("");
}

function renderTrend(){
  const W=520,H=180,pl=40,pr=40,pt=16,pb=26;
  const series=MONTHS.map(m=>{const a=agg(m);return{m,pnl:a.pnl/10000,vis:a.visitors,deals:a.deals};});
  const xs=i=>pl+(W-pl-pr)*(i/(series.length-1));
  const mk=(arr,key)=>{const mx=Math.max(...arr.map(d=>d[key]),1);return arr.map((d,i)=>[xs(i),H-pb-(H-pt-pb)*(d[key]/mx)]);};
  const line=(pts,col,wd)=>`<polyline fill="none" stroke="${col}" stroke-width="${wd}" stroke-linejoin="round" points="${pts.map(p=>p.join(',')).join(' ')}"/>`+
    pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.2" fill="${col}"/>`).join("");
  const pnlP=mk(series,"pnl"),visP=mk(series,"vis"),dealP=mk(series,"deals");
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  for(let g=0;g<=3;g++){const y=pt+(H-pt-pb)*g/3;svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${css('--line')}" stroke-width="1"/>`;}
  series.forEach((d,i)=>{svg+=`<text x="${xs(i)}" y="${H-8}" font-size="11" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${d.m}</text>`;});
  svg+=line(pnlP,css('--brand'),2.4)+line(visP,css('--blue'),1.8)+line(dealP,css('--amber'),1.8);
  series.forEach((d,i)=>{svg+=`<text x="${xs(i)}" y="${pnlP[i][1]-9}" font-size="10.5" fill="${css('--brand')}" text-anchor="middle" font-family="Noto Sans TC" font-weight="700">${fmtW(d.pnl*10000)}</text>`;});
  svg+=`</svg>`;
  document.getElementById("trend").innerHTML=svg;
}

  wk.forEach((v,i)=>{const x=xs(i),y=ys(v),y0=ys(0),pos=v>=0;
    svg+=`<rect x="${x-16}" y="${Math.min(y,y0)}" width="32" height="${Math.abs(y-y0)||1}" rx="2" fill="${pos?css('--pos'):css('--neg')}"/>`;
    svg+=`<text x="${x}" y="${H-6}" font-size="10" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${labels[i]}</text>`;});
  svg+=`</svg>`;
  document.getElementById("dBody").innerHTML=`
    <div class="dstat">
      <div class="s"><div class="sl">本月損益</div><div class="sv num" style="color:${r.month_pnl>=0?'var(--pos)':'var(--neg)'}">${r.month_pnl>=0?'':'-'}${fmtW(Math.abs(r.month_pnl))} 萬</div></div>
      <div class="s"><div class="sl">去化率</div><div class="sv num" style="color:var(--blue)">${(r.rate*100).toFixed(1)}%</div></div>
      <div class="s"><div class="sl">已售 / 規劃</div><div class="sv num">${fmtN(r.sold)} / ${fmtN(r.units)}</div></div>
      <div class="s"><div class="sl">剩餘戶 / 車</div><div class="sv num">${fmtN(r.remain_units)} / ${fmtN(r.remain_parking)}</div></div>
      <div class="s"><div class="sl">本月來人</div><div class="sv num">${fmtN(r.visitors)} 組</div></div>
      <div class="s"><div class="sl">本月成交</div><div class="sv num">${fmtN(r.deals)} 戶</div></div>
    </div>
    <div class="dsec">當月各週損益（萬元）</div>
    <div class="spark">${svg}</div>
    <div class="dsec">財務</div>
    <div class="dstat">
      <div class="s"><div class="sl">案量</div><div class="sv num">${fmtN(r.volume)}</div></div>
      <div class="s"><div class="sl">公司管銷</div><div class="sv num">${fmtW(r.company_oh||0)} 萬</div></div>
    </div>`;
  document.getElementById("drawer").classList.add("show");
  document.getElementById("scrim").classList.add("show");
}
function closeDrawer(){document.getElementById("drawer").classList.remove("show");document.getElementById("scrim").classList.remove("show");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});

function renderAll(){renderKpis();renderBars();renderDehua();renderTrend();renderConv();renderTable();}
renderSeg();renderAll();
</script>
</body>
</html>
