<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>翊鼎國際廣告 · 代銷投組控制台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --page:#EBEEF3;--card:#FFF;--line:#E1E5EC;--line2:#EDEFF4;
  --ink:#161A22;--mut:#626B7C;--faint:#909AAB;
  --brand:#27345E;--brand2:#36487C;
  --pos:#15795A;--posbg:#E4F1EB;--neg:#C0392B;--negbg:#F8E7E4;
  --blue:#2C6FB3;--bluebg:#E5EEF7;--amber:#B07914;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page);color:var(--ink);font-family:"Noto Sans TC",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}

/* ── header ── */
header{background:var(--brand);color:#fff;margin-bottom:22px}
.hd{max-width:1180px;margin:0 auto;padding:16px 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.htitle .co{font-size:11px;color:#B9C2DC;letter-spacing:1.8px;font-weight:500;margin-bottom:4px}
.htitle h1{font-size:19px;font-weight:700;letter-spacing:.4px}
.htitle p{font-size:12px;color:#B9C2DC;margin-top:3px}
.hright{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.seg{display:flex;background:rgba(255,255,255,.10);border-radius:9px;padding:3px}
.seg button{font-family:inherit;border:0;background:transparent;color:#C5CDE3;font-size:13px;font-weight:500;padding:7px 13px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button:hover{color:#fff}.seg button.on{background:#fff;color:var(--brand)}
.scope{font-size:11px;color:#9FA9C6;text-align:right;line-height:1.7}

/* ── loader ── */
.loader{text-align:center;padding:72px 0;color:var(--faint);font-size:13.5px}
.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── KPI row ── */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 15px}
.kpi .k{font-size:11px;color:var(--mut);font-weight:500;letter-spacing:.2px}
.kpi .v{font-size:22px;font-weight:700;margin-top:6px;line-height:1.1}
.kpi .u{font-size:12px;color:var(--faint);font-weight:400;margin-left:2px}
.kpi .d{font-size:11px;margin-top:4px;font-weight:500}
.up{color:var(--pos)}.dn{color:var(--neg)}

/* ── 2-col grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.panel h2{font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.sub{font-size:11px;color:var(--faint);font-weight:400}

/* ── diverging bars ── */
.bars{margin-top:13px}
.barrow{display:grid;grid-template-columns:115px 1fr 84px;align-items:center;gap:8px;padding:3px 2px;cursor:pointer;border-radius:6px}
.barrow:hover{background:var(--line2)}
.barrow .nm{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track{position:relative;height:16px}
.zero{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line)}
.bar{position:absolute;top:2px;height:12px;border-radius:3px}
.barrow .val{font-size:12px;text-align:right;font-weight:500}

/* ── dehua ── */
.plist{margin-top:12px;max-height:300px;overflow:auto}
.prow{padding:7px 0;border-bottom:1px solid var(--line2);cursor:pointer}
.prow:hover{background:var(--line2);margin:0 -4px;padding:7px 4px;border-radius:6px}
.prow:last-child{border-bottom:0}
.ptop{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.pct{font-weight:700;color:var(--blue)}
.ptrack{height:7px;background:#EDF0F5;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--blue);border-radius:4px}
.pmeta{font-size:10.5px;color:var(--faint);margin-top:3px}

/* ── trend + legend ── */
.trendwrap{margin-top:10px}
.legend{display:flex;gap:14px;font-size:11px;color:var(--mut);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── conversion ── */
.conv-cards{display:flex;gap:12px;margin-top:13px}
.convcard{flex:1;background:var(--line2);border-radius:9px;padding:12px}
.convcard .cl{font-size:11px;color:var(--mut)}
.convcard .cv{font-size:20px;font-weight:700;margin-top:3px}
.funnel{margin-top:13px}
.fbar{height:28px;border-radius:6px;display:flex;align-items:center;padding:0 11px;color:#fff;font-size:12px;font-weight:500;margin-bottom:6px}

/* ── table ── */
.tablepanel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.tablehead{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.tablehead h2{font-size:13.5px;font-weight:700}
.hint{font-size:11px;color:var(--faint)}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 12px;font-size:12px;text-align:right;white-space:nowrap}
th{background:#F7F8FB;color:var(--mut);font-weight:500;font-size:11px;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left;padding-left:18px}
th.arrow::after{content:" ▾";color:var(--brand)}
th.arrow.asc::after{content:" ▴"}
tbody tr{border-bottom:1px solid var(--line2);cursor:pointer}
tbody tr:hover{background:#F4F7FB}
tbody tr:last-child{border-bottom:0}
.chip{display:inline-block;min-width:52px;text-align:center;padding:2px 6px;border-radius:5px;font-weight:500;font-size:11px}

/* ── drawer ── */
.scrim{position:fixed;inset:0;background:rgba(20,24,35,.42);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:780px;max-width:96vw;background:var(--card);transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1);z-index:50;overflow:auto;box-shadow:-6px 0 24px rgba(20,24,35,.16)}
.drawer.show{transform:none}
.dhd{background:var(--brand);color:#fff;padding:18px 24px;position:sticky;top:0;z-index:1}
.dhd .x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.14);border:0;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:18px;line-height:30px;text-align:center}
.dhd h3{font-size:18px;font-weight:700;padding-right:40px}
.dhd p{font-size:12px;color:#B9C2DC;margin-top:3px}
.dbody{padding:20px 24px}
.dstat{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.dstat .s{background:var(--line2);border-radius:9px;padding:12px 14px}
.dstat .sl{font-size:11px;color:var(--mut)}
.dstat .sv{font-size:17px;font-weight:700;margin-top:3px}
.dsec{font-size:12.5px;font-weight:700;margin:18px 0 9px;color:var(--ink)}
.spark{background:var(--line2);border-radius:9px;padding:14px 12px 8px}
.dcharts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.recon-warn{background:var(--warnbg);border:1px solid #E8C98A;border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--warn);display:flex;gap:8px;align-items:flex-start}
.recon-warn .ri{flex-shrink:0;font-size:15px}
.wflag{font-size:10px;color:var(--warn);margin-left:3px;cursor:help}

/* ── responsive ── */
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}}
@media(max-width:760px){.drawer{width:100vw}.dstat{grid-template-columns:repeat(2,1fr)}.dcharts{grid-template-columns:1fr}}
@media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.hd{flex-direction:column;align-items:stretch}.hright{align-items:flex-start}}

/* ── view nav tabs ── */
.viewnav{display:flex;gap:4px;margin-top:8px}
.vtab{font-family:inherit;font-size:13px;font-weight:500;padding:5px 14px;border-radius:7px;border:0;cursor:pointer;background:rgba(255,255,255,.10);color:#C5CDE3;transition:.15s}
.vtab:hover{color:#fff;background:rgba(255,255,255,.16)}
.vtab.on{background:#fff;color:var(--brand)}

/* ── weekly controls ── */
.wkctrl{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.wkctrl .grp{display:flex;flex-direction:column;gap:3px}
.wkctrl label{font-size:11px;color:var(--mut);font-weight:500}
.wkctrl select{font-family:inherit;font-size:13.5px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);outline:none;cursor:pointer;min-width:200px}
.wkctrl select:focus{border-color:var(--brand)}
.wkcover{margin-left:auto;font-size:12px;color:var(--mut);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 13px}
.wkcover b{color:var(--brand)}

/* ── WoW metric cards ── */
.wkkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.wkkpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.wkkpi .k{font-size:11px;color:var(--mut);font-weight:500}
.wkkpi .v{font-size:21px;font-weight:700;margin-top:6px;line-height:1.05}
.wkkpi .u{font-size:11.5px;color:var(--faint);font-weight:400;margin-left:2px}
.wow{font-size:11px;margin-top:5px;font-weight:500;display:flex;align-items:center;gap:4px}
.wow .nochg{color:var(--faint)}
.wkup{color:var(--pos)}.wkdn{color:var(--neg)}

/* ── weekly section ── */
.wksec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.wksec h2{font-size:13.5px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.wksec h2 .sub{font-size:11px;color:var(--faint);font-weight:400}
.wkrow6{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wkbudget{background:var(--line2);border-radius:9px;padding:11px 13px}
.wkbudget .bl{font-size:11px;color:var(--mut)}
.wkbudget .bv{font-size:15px;font-weight:700;margin-top:3px}

/* WoW chart highlight */
.wkgrid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.wkkpis{grid-template-columns:repeat(2,1fr)}.wkgrid2{grid-template-columns:1fr}.wkrow6{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="hd">
    <div class="htitle">
      <div class="co">翊鼎國際廣告</div>
      <h1>代銷投組控制台</h1>
      <div class="viewnav">
        <button class="vtab on" id="vtab-monthly" onclick="switchView('monthly')">投組總覽</button>
        <button class="vtab" id="vtab-weekly" onclick="switchView('weekly')">週報</button>
      </div>
    </div>
    <div class="hright">
      <div class="seg" id="seg"><span style="color:#9FA9C6;font-size:13px;padding:8px 12px">載入中…</span></div>
      <div class="scope" id="scope">連線中…</div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="main"><div class="loader"><div class="spinner"></div>正在載入資料…</div></div>
  <div id="weekly" style="display:none"></div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dhd">
    <button class="x" onclick="closeDrawer()">×</button>
    <h3 id="dName"></h3><p id="dMeta"></p>
  </div>
  <div class="dbody" id="dBody"></div>
</div>

<script>
/* ── helpers ── */
const fmtW = n => n==null ? "—" : (n/10000).toLocaleString("zh-TW",{minimumFractionDigits:1,maximumFractionDigits:1});
const fmtN = n => n==null ? "—" : Math.round(n).toLocaleString("zh-TW");
const css  = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const el   = id => document.getElementById(id);

/* ── state ── */
let DB={}, CUR="", sortKey="month_pnl", sortDir=-1;
let SETTINGS={};  // project_settings from db.json
let VIEW="monthly";
let WEEKS=[], CURWEEK="", CURPROJ="__all__";   // weekly view state

/* ── boot ── */
async function init(){
  try{
    const res = await fetch("db.json?v="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    DB = await res.json();
    if(!DB.months||!DB.months.length){
      el("main").innerHTML='<div class="loader">尚無資料。請先執行 update_data.py 並 git push。</div>';
      return;
    }
    CUR = DB.months[DB.months.length-1];
    SETTINGS = DB.project_settings || {};
    buildWeekCalendar();
    renderAll();
  } catch(e){
    el("main").innerHTML=`<div class="loader" style="color:var(--neg)">載入 db.json 失敗：${e.message}<br><small>請確認 db.json 在同一個 repo 根目錄。</small></div>`;
  }
}

/* ── weekly calendar: union of all projects' week_start ── */
function buildWeekCalendar(){
  const set=new Set();
  const projects=DB.projects||{};
  for(const name in projects){
    const wk=projects[name].weekly||{};
    for(const k in wk){ if(wk[k].week_start) set.add(wk[k].week_start); }
  }
  WEEKS=[...set].sort();
  CURWEEK = WEEKS.length ? WEEKS[WEEKS.length-1] : "";
}
/* 取得某案在某週的記錄 */
function projWeek(name, weekStart){
  const wk=(DB.projects[name]||{}).weekly||{};
  return Object.values(wk).find(w=>w.week_start===weekStart)||null;
}
/* 該案前一個有資料的週 */
function prevWeekFor(name, weekStart){
  const wk=(DB.projects[name]||{}).weekly||{};
  const dates=Object.values(wk).map(w=>w.week_start).filter(Boolean).sort();
  const i=dates.indexOf(weekStart);
  return i>0?dates[i-1]:null;
}
/* 有單案週資料的建案清單 */
function weeklyProjects(){
  return Object.keys(DB.projects||{}).filter(n=>Object.keys((DB.projects[n].weekly)||{}).length);
}
/* 在售建案（動態）：取最新月報名單，排除完售（剩餘戶=0）。會隨月報更新自動增減 */
function activeProjects(){
  const latest=DB.months[DB.months.length-1];
  const rows=DB.portfolio[latest]||[];
  const active=rows.filter(r=>(r.remain_units==null||r.remain_units>0)).map(r=>r.project_name);
  // 併入有週報但不在月報名單者（新承接、月報尚未更新）
  weeklyProjects().forEach(n=>{ if(!active.includes(n)) active.push(n); });
  return active;
}

/* ── aggregation ── */
function agg(rows){
  const units=rows.reduce((a,r)=>a+(r.units||0),0);
  const remain=rows.reduce((a,r)=>a+(r.remain_units||0),0);
  return{ units, remain,
    pnl:     rows.reduce((a,r)=>a+(r.month_pnl||0),0),
    visitors:rows.reduce((a,r)=>a+(r.visitors||0),0),
    deals:   rows.reduce((a,r)=>a+(r.deals||0),0),
  };
}

/* ── render ── */
function renderAll(){
  const rows = DB.portfolio[CUR]||[];
  const idx  = DB.months.indexOf(CUR);
  const prevM= idx>0?DB.months[idx-1]:null;
  const prevRows = prevM?(DB.portfolio[prevM]||[]):[];
  const a=agg(rows), pa=prevRows.length?agg(prevRows):null;

  /* seg buttons */
  el("seg").innerHTML = DB.months.map(m=>
    `<button class="${m===CUR?'on':''}" onclick="setMonth('${m}')">${m}</button>`).join("");
  el("scope").textContent=`在售 ${rows.length} 案 · 損益萬元 · 更新 ${DB.updated_at||""}`;

  /* delta helper */
  const delta=(cv,pv,fmt,inv)=>{
    if(!pa)return"";
    const d=cv-pv, pos=d>=0;
    const cls=(inv?!pos:pos)?"up":"dn";
    return`<div class="d ${cls}">${pos?"▲":"▼"} ${fmt(Math.abs(d))} vs ${prevM}</div>`;
  };

  /* KPIs */
  const rate=(a.units-a.remain)/a.units;
  const kpis=[
    {k:"在售建案",   v:fmtN(rows.length),u:"案",d:""},
    {k:"規劃戶數",   v:fmtN(a.units),    u:"戶",d:""},
    {k:"剩餘可售",   v:fmtN(a.remain),   u:"戶",d:delta(a.remain,pa?.remain||0,fmtN,true)},
    {k:"本月損益合計",v:fmtW(a.pnl),     u:"萬", d:delta(a.pnl,pa?.pnl||0,fmtW,false)},
    {k:"本月來人",   v:fmtN(a.visitors), u:"組", d:delta(a.visitors,pa?.visitors||0,fmtN,false)},
    {k:"本月成交",   v:fmtN(a.deals),    u:"戶", d:delta(a.deals,pa?.deals||0,fmtN,false)},
  ];

  el("main").innerHTML=`
    <div class="kpis" id="kpis"></div>
    <div class="grid2">
      <div class="panel"><h2>建案損益排行 <span class="sub">${CUR} · 萬元</span></h2><div class="bars" id="bars"></div></div>
      <div class="panel"><h2>去化進度 <span class="sub">已售 / 規劃戶數</span></h2><div class="plist" id="dehua"></div></div>
    </div>
    <div class="grid2">
      <div class="panel">
        <h2>月損益趨勢 <span class="sub">投組合計</span></h2>
        <div class="trendwrap" id="trend"></div>
        <div class="legend">
          <span><i class="dot" style="background:var(--brand)"></i>損益(萬)</span>
          <span><i class="dot" style="background:var(--blue)"></i>來人</span>
          <span><i class="dot" style="background:var(--amber)"></i>成交</span>
        </div>
      </div>
      <div class="panel"><h2>來人 → 成交 <span class="sub">${CUR}</span></h2><div id="conv"></div></div>
    </div>
    <div class="tablepanel">
      <div class="tablehead"><h2>建案明細</h2><span class="hint">點欄位排序 · 點列查看單案</span></div>
      <div style="overflow-x:auto"><table><thead><tr id="thr"></tr></thead><tbody id="tbody"></tbody></table></div>
    </div>`;

  /* KPI cards */
  el("kpis").innerHTML=kpis.map(c=>
    `<div class="kpi"><div class="k">${c.k}</div><div class="v num">${c.v}<span class="u">${c.u}</span></div>${c.d}</div>`
  ).join("");

  /* diverging bars */
  const bRows=[...rows].sort((a,b)=>(b.month_pnl||0)-(a.month_pnl||0));
  const mx=Math.max(...bRows.map(r=>Math.abs(r.month_pnl||0)),1);
  el("bars").innerHTML=bRows.map(r=>{
    const v=r.month_pnl||0, w=Math.abs(v)/mx*50, pos=v>=0;
    return`<div class="barrow" onclick="openDrawer('${r.project_name}')">
      <div class="nm" title="${r.project_name}">${r.project_name}</div>
      <div class="track"><div class="zero"></div>
        <div class="bar" style="${pos?`left:50%;width:${w}%;background:var(--pos)`:`right:50%;width:${w}%;background:var(--neg)`}"></div>
      </div>
      <div class="val num" style="color:${pos?'var(--pos)':'var(--neg)'}">${pos?'':'-'}${fmtW(Math.abs(v))}</div>
    </div>`;
  }).join("");

  /* dehua */
  const dRows=[...rows].sort((a,b)=>{
    const ra=a.units?(a.units-a.remain_units)/a.units:0;
    const rb=b.units?(b.units-b.remain_units)/b.units:0;
    return rb-ra;
  });
  el("dehua").innerHTML=dRows.map(r=>{
    const sold=(r.units||0)-(r.remain_units||0);
    const pct=r.units?sold/r.units*100:0;
    return`<div class="prow" onclick="openDrawer('${r.project_name}')">
      <div class="ptop"><span>${r.project_name}</span><span class="pct num">${pct.toFixed(1)}%</span></div>
      <div class="ptrack"><div class="pfill" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="pmeta num">已售 ${fmtN(sold)} / ${fmtN(r.units)} 戶 · 剩 ${fmtN(r.remain_units)}</div>
    </div>`;
  }).join("");

  /* trend SVG */
  const tData=DB.months.map(m=>{
    const rs=DB.portfolio[m]||[];
    if(!rs.length)return null;
    return{m,pnl:rs.reduce((a,x)=>a+(x.month_pnl||0),0)/10000,
            vis:rs.reduce((a,x)=>a+(x.visitors||0),0),
            deals:rs.reduce((a,x)=>a+(x.deals||0),0)};
  }).filter(Boolean);
  el("trend").innerHTML=buildTrend(tData);

  /* conversion */
  const cr=a.visitors?a.deals/a.visitors*100:0;
  const dw=a.visitors?Math.max(a.deals/a.visitors*100,6):6;
  el("conv").innerHTML=`
    <div class="conv-cards">
      <div class="convcard"><div class="cl">來人</div><div class="cv num">${fmtN(a.visitors)}<span style="font-size:12px;color:var(--faint);font-weight:400"> 組</span></div></div>
      <div class="convcard"><div class="cl">成交</div><div class="cv num">${fmtN(a.deals)}<span style="font-size:12px;color:var(--faint);font-weight:400"> 戶</span></div></div>
      <div class="convcard"><div class="cl">成交轉換率</div><div class="cv num" style="color:var(--blue)">${cr.toFixed(1)}%</div></div>
    </div>
    <div class="funnel">
      <div class="fbar num" style="width:100%;background:var(--blue)">來人 ${fmtN(a.visitors)}</div>
      <div class="fbar num" style="width:${dw}%;background:var(--brand);min-width:90px">成交 ${fmtN(a.deals)}</div>
    </div>`;

  renderTable(rows);
}

function buildTrend(tData){
  const W=500,H=170,pl=38,pr=30,pt=16,pb=26;
  const n=tData.length, xs=i=>pl+(W-pl-pr)*(n>1?i/(n-1):0.5);
  const mkL=(key,col,wd)=>{
    const vs=tData.map(d=>d[key]);
    const mx=Math.max(...vs.map(Math.abs),1);
    const pts=tData.map((d,i)=>`${xs(i)},${H-pb-(H-pt-pb)*(d[key]/mx)}`).join(' ');
    const circles=tData.map((d,i)=>`<circle cx="${xs(i)}" cy="${H-pb-(H-pt-pb)*(d[key]/mx)}" r="3" fill="${col}"/>`).join('');
    return`<polyline fill="none" stroke="${col}" stroke-width="${wd}" stroke-linejoin="round" points="${pts}"/>${circles}`;
  };
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  for(let g=0;g<=3;g++){const y=pt+(H-pt-pb)*g/3;svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${css('--line')}" stroke-width="1"/>`;}
  tData.forEach((d,i)=>{svg+=`<text x="${xs(i)}" y="${H-7}" font-size="10.5" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${d.m}</text>`;});
  svg+=mkL('pnl',css('--brand'),2.2)+mkL('vis',css('--blue'),1.8)+mkL('deals',css('--amber'),1.8);
  const pnlMax=Math.max(...tData.map(d=>Math.abs(d.pnl)),1);
  tData.forEach((d,i)=>{
    const y=H-pb-(H-pt-pb)*(d.pnl/pnlMax);
    svg+=`<text x="${xs(i)}" y="${y-8}" font-size="10" fill="${css('--brand')}" text-anchor="middle" font-weight="700" font-family="Noto Sans TC">${fmtW(d.pnl*10000)}</text>`;
  });
  return svg+'</svg>';
}

/* ── commission rate helpers ── */
function getCommRate(name){
  return (SETTINGS[name]&&SETTINGS[name].commission_rate!=null)
    ? SETTINGS[name].commission_rate : 0.05;
}
async function editRate(name){
  const cur = getCommRate(name);
  const raw = prompt(
    `「${name}」佣金比率\n\n目前：${(cur*100).toFixed(2)}%\n\n請輸入新比率（%，例如 4.5）：`,
    (cur*100).toFixed(2)
  );
  if(raw===null)return;
  const val = parseFloat(raw);
  if(isNaN(val)||val<=0||val>30){
    alert("請輸入合理的比率（0~30 之間）");return;
  }
  SETTINGS[name]={...(SETTINGS[name]||{}), commission_rate:val/100};
  DB.project_settings = SETTINGS;
  // 寫回 db.json（下載更新版）
  saveSettings();
  renderTable(DB.portfolio[CUR]||[]);
}
function saveSettings(){
  // 產生更新後的 db.json 供下載（GitHub Pages 無法直接寫檔）
  DB.project_settings = SETTINGS;
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'db.json';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1000);
  showToast('✅ 已下載更新後的 db.json，請上傳至 GitHub repo 以儲存設定');
}
function showToast(msg,err=false){
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{
    position:'fixed',bottom:'22px',right:'22px',zIndex:'999',
    background:err?'var(--neg)':'var(--pos)',color:'#fff',
    padding:'10px 18px',borderRadius:'9px',fontSize:'13px',
    fontWeight:'500',boxShadow:'0 4px 16px rgba(0,0,0,.18)',
    fontFamily:'"Noto Sans TC",sans-serif',maxWidth:'380px',lineHeight:'1.4'
  });
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

/* 週報 vs 月報 勾稽：比對單案週資料月末值與投組月報 */
function reconcile(name){
  const proj=(DB.projects||{})[name];
  if(!proj||!proj.weekly) return null;
  const diffs=[];
  // 對每個有月報的月份，比對該月最後一週的剩餘戶 vs 月報剩餘戶
  const byMonth={};
  for(const k in proj.weekly){
    const w=proj.weekly[k]; if(!w.week_start)continue;
    const d=new Date(w.week_start); const ym=`${d.getFullYear()-1911}.${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[ym]||w.week_start>byMonth[ym].week_start) byMonth[ym]=w;
  }
  for(const ym in byMonth){
    const mRow=(DB.portfolio[ym]||[]).find(r=>r.project_name===name);
    if(!mRow)continue;
    const wkEnd=byMonth[ym];
    if(mRow.remain_units!=null && wkEnd.remain_units!=null){
      const diff=Math.abs(mRow.remain_units-wkEnd.remain_units);
      if(diff>3) diffs.push(`${ym} 剩餘戶：週報 ${wkEnd.remain_units} vs 月報 ${mRow.remain_units}（差 ${diff} 戶）`);
    }
  }
  return diffs.length?diffs:null;
}
function reconHtml(name){
  const d=reconcile(name);
  if(!d)return'';
  return `<div class="recon-warn"><span class="ri">⚠</span><div>
    <b>週報與月報數字不一致</b><br>${d.join('<br>')}
    <div style="margin-top:4px;color:var(--mut);font-size:11.5px">請確認是退戶、買回或上傳錯誤所致。</div>
  </div>`;
}

/* 週損益：使用深度資料（signed_week_amount 作為本週成交金額代理）+ visitors */
function buildWeeklyBarsDeep(wkRows){
  if(!wkRows.length)return'<div style="font-size:11px;color:var(--faint);padding:8px 0">本月尚無週資料</div>';
  const W=370,H=130,pl=6,pr=6,pt=14,pb=38;
  const vals=wkRows.map(w=>w.signed_week_amount||0);
  const vis=wkRows.map(w=>w.visitors_week||0);
  const mx=Math.max(...vals.map(Math.abs),1);
  const n=wkRows.length;
  const xs=i=>pl+(W-pl-pr)*(n>1?i/(n-1):0.5);
  const ys=v=>{const mid=(H-pt-pb)/2+pt;return mid-(v/mx)*((H-pt-pb)/2);};
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  svg+=`<line x1="${pl}" y1="${ys(0)}" x2="${W-pr}" y2="${ys(0)}" stroke="${css('--line')}" stroke-width="1"/>`;
  vals.forEach((v,i)=>{
    const x=xs(i),y=ys(v),y0=ys(0),pos=v>=0,bh=Math.max(Math.abs(y-y0),1);
    svg+=`<rect x="${x-18}" y="${Math.min(y,y0)}" width="36" height="${bh}" rx="2" fill="${pos?css('--pos'):css('--neg')}"/>`;
    svg+=`<text x="${x}" y="${Math.min(y,y0)-4}" font-size="9" fill="${pos?css('--pos'):css('--neg')}" text-anchor="middle" font-family="Noto Sans TC">${fmtW(v)}</text>`;
    // x軸：日期 + 來人
    const label=wkRows[i].week_start?wkRows[i].week_start.slice(5):(i+1+'W');
    svg+=`<text x="${x}" y="${H-20}" font-size="9" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${label}</text>`;
    svg+=`<text x="${x}" y="${H-8}" font-size="9" fill="${css('--blue')}" text-anchor="middle" font-family="Noto Sans TC">👁 ${vis[i]}</text>`;
  });
  return svg+'</svg>';
}

/* 銷況熱力圖 */
function buildStatusHeatmap(us){
  const matrix=us.matrix||[];
  if(!matrix.length)return'';
  // 取得所有樓層與戶別
  const floors=[...new Set(matrix.map(r=>r.floor))].sort((a,b)=>{
    const na=parseInt(a),nb=parseInt(b); return nb-na;
  });
  const units=[...new Set(matrix.map(r=>r.unit))];
  const lookup={};
  matrix.forEach(r=>{lookup[`${r.floor}__${r.unit}`]=r.status;});

  // 圖例
  const statusCounts={};
  matrix.forEach(r=>{statusCounts[r.status]=(statusCounts[r.status]||0)+1;});
  const legendEntries=Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]);
  let legend=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">`;
  legendEntries.forEach(([s,cnt])=>{
    legend+=`<span style="font-size:10px;background:${STATUS_COLOR[s]||'#E8ECF2'};color:${STATUS_TEXT[s]||'#909AAB'};padding:2px 7px;border-radius:4px">${s} ${cnt}</span>`;
  });
  legend+='</div>';

  const cellW=Math.floor(340/units.length);
  const cellH=14;
  const W=cellW*units.length+36, H=cellH*floors.length+28;

  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="font-family:'Noto Sans TC',sans-serif">`;
  // col headers
  units.forEach((u,i)=>{
    svg+=`<text x="${36+i*cellW+cellW/2}" y="12" font-size="8" fill="${css('--mut')}" text-anchor="middle">${u}</text>`;
  });
  floors.forEach((fl,fi)=>{
    svg+=`<text x="32" y="${20+fi*cellH+cellH/2}" font-size="8" fill="${css('--mut')}" text-anchor="end" dominant-baseline="middle">${fl}</text>`;
    units.forEach((u,ui)=>{
      const st=lookup[`${fl}__${u}`]||'';
      const bg=STATUS_COLOR[st]||'transparent';
      svg+=`<rect x="${36+ui*cellW}" y="${18+fi*cellH}" width="${cellW-1}" height="${cellH-1}" rx="1" fill="${bg}"/>`;
      if(st && st!=='未售'){
        const tc=STATUS_TEXT[st]||'#fff';
        svg+=`<text x="${36+ui*cellW+cellW/2}" y="${18+fi*cellH+cellH/2}" font-size="7" fill="${tc}" text-anchor="middle" dominant-baseline="middle">${st}</text>`;
      }
    });
  });
  svg+='</svg>';
  return legend+`<div style="overflow-x:auto">${svg}</div>`;
}

function buildWeeklyBars(wk){
  // fallback 舊格式（portfolio weekly by label）
  if(!wk.length)return'<div style="font-size:11px;color:var(--faint);padding:8px 0">本月尚無週資料</div>';
  const W=370,H=120,pl=6,pr=6,pt=14,pb=22;
  const labels=["W1","W2","W3","W4","W5"];
  const vals=labels.map(l=>{const r=wk.find(x=>x.week_label===l);return r?.pnl??null;});
  const mx=Math.max(...vals.map(v=>Math.abs(v??0)),1);
  const xs=i=>pl+(W-pl-pr)*(i/4);
  const ys=v=>{const mid=(H-pt-pb)/2+pt;return mid-((v??0)/mx)*((H-pt-pb)/2);};
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  svg+=`<line x1="${pl}" y1="${ys(0)}" x2="${W-pr}" y2="${ys(0)}" stroke="${css('--line')}" stroke-width="1"/>`;
  vals.forEach((v,i)=>{
    const x=xs(i),y=ys(v??0),y0=ys(0),pos=(v??0)>=0,bh=Math.max(Math.abs(y-y0),1);
    svg+=`<rect x="${x-14}" y="${Math.min(y,y0)}" width="28" height="${bh}" rx="2" fill="${pos?css('--pos'):css('--neg')}" opacity="${v==null?0.25:1}"/>`;
    svg+=`<text x="${x}" y="${H-5}" font-size="10" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${labels[i]}</text>`;
    if(v!=null)svg+=`<text x="${x}" y="${Math.min(y,y0)-4}" font-size="9.5" fill="${pos?css('--pos'):css('--neg')}" text-anchor="middle" font-family="Noto Sans TC">${fmtW(v)}</text>`;
  });
  return svg+'</svg>';
}

function buildMiniTrend(data){
  if(!data.length)return'<div style="font-size:11px;color:var(--faint);padding:8px">無資料</div>';
  const W=370,H=90,pl=6,pr=6,pt=12,pb=22;
  const mx=Math.max(...data.map(d=>Math.abs(d.pnl)),1);
  const xs=i=>pl+(W-pl-pr)*(data.length>1?i/(data.length-1):0.5);
  const ys=v=>H-pb-(H-pt-pb)*(v/mx);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  for(let g=0;g<=2;g++){const y=pt+(H-pt-pb)*g/2;svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${css('--line')}" stroke-width="1"/>`;}
  data.forEach((d,i)=>{svg+=`<text x="${xs(i)}" y="${H-5}" font-size="9.5" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${d.m}</text>`;});
  svg+=`<polyline fill="none" stroke="${css('--brand')}" stroke-width="2" stroke-linejoin="round" points="${data.map((d,i)=>`${xs(i)},${ys(d.pnl)}`).join(' ')}"/>`;
  data.forEach((d,i)=>{svg+=`<circle cx="${xs(i)}" cy="${ys(d.pnl)}" r="3" fill="${css('--brand')}"/>`});
  return svg+'</svg>';
}

function closeDrawer(){
  el("drawer").classList.remove("show");
  el("scrim").classList.remove("show");
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});

/* ════════════════ 週報 (Weekly Report) ════════════════ */
function switchView(v){
  VIEW=v;
  el('vtab-monthly').classList.toggle('on', v==='monthly');
  el('vtab-weekly').classList.toggle('on', v==='weekly');
  el('main').style.display   = v==='monthly'?'':'none';
  el('weekly').style.display = v==='weekly'?'':'none';
  el('seg').style.display    = v==='monthly'?'':'none';
  el('scope').style.display  = v==='monthly'?'':'none';
  if(v==='weekly') renderWeekly();
}

function rocDate(iso){
  if(!iso) return '';
  const [y,m,d]=iso.split('-').map(Number);
  return `${y-1911}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
}
function wkLabel(weekStart){
  let end=null;
  for(const n of weeklyProjects()){ const r=projWeek(n,weekStart); if(r&&r.week_end){end=r.week_end;break;} }
  const s=rocDate(weekStart);
  const e=end?rocDate(end).slice(-5):'';
  return e?`${s} – ${e}`:s;
}
function getUnits(name){
  for(const m of DB.months){ const r=(DB.portfolio[m]||[]).find(x=>x.project_name===name); if(r&&r.units) return r.units; }
  return null;
}
function wowSpan(cur, prev, fmt, mode='good_up'){
  if(prev==null||cur==null) return '<span class="wow nochg" title="無上週資料">vs 上週 —</span>';
  const d=cur-prev;
  if(Math.abs(d)<1e-9) return '<span class="wow nochg">▬ 持平</span>';
  const pos=d>0, arrow=pos?'▲':'▼';
  let cls;
  if(mode==='neutral') cls='nochg';
  else { const good = mode==='good_down' ? !pos : pos; cls=good?'wkup':'wkdn'; }
  // 劇變偵測：上週為正值且本週變動超過 ±200%（3 倍）→ 加警示
  let flag='';
  if(Math.abs(prev)>=3 && Math.abs(d) > Math.abs(prev)*2){
    const ratio=(d/Math.abs(prev)*100).toFixed(0);
    flag=`<span class="wflag" title="本週相對上週變動 ${ratio}%，幅度異常，請確認上傳數字">⚠</span>`;
  }
  return `<span class="wow ${cls}" title="vs 上週">${arrow} ${fmt(Math.abs(d))}${flag}</span>`;
}

function renderWeekly(){
  if(!WEEKS.length){
    el('weekly').innerHTML='<div class="loader">尚無單案週報資料。<br><small>請上傳單案週檢討 Excel（如合康雙匯），週報會自動建立。</small></div>';
    return;
  }
  if(!CURWEEK) CURWEEK=WEEKS[WEEKS.length-1];
  const wkProjs=weeklyProjects();
  if(CURPROJ!=='__all__' && !wkProjs.includes(CURPROJ)) CURPROJ='__all__';

  const weekOpts=[...WEEKS].reverse().map(w=>`<option value="${w}" ${w===CURWEEK?'selected':''}>${wkLabel(w)}</option>`).join('');
  const projOpts=`<option value="__all__" ${CURPROJ==='__all__'?'selected':''}>全部彙總</option>`+
    wkProjs.map(n=>`<option value="${n}" ${n===CURPROJ?'selected':''}>${n}</option>`).join('');

  const activeRoster=activeProjects();
  const totalProjects=activeRoster.length;
  const reported=wkProjs.filter(n=>projWeek(n,CURWEEK)).length;

  let html=`
    <div class="wkctrl">
      <div class="grp"><label>週別</label><select onchange="CURWEEK=this.value;renderWeekly()">${weekOpts}</select></div>
      <div class="grp"><label>建案</label><select onchange="CURPROJ=this.value;renderWeekly()">${projOpts}</select></div>
      <div class="wkcover">本週已回報 <b>${reported}</b> / ${totalProjects} 案在售${reported<totalProjects?` <span style="color:var(--warn)">（缺 ${totalProjects-reported}）</span>`:''}</div>
    </div>`;

  html += (CURPROJ==='__all__') ? renderWeeklyPortfolio() : renderWeeklyProject(CURPROJ);
  el('weekly').innerHTML=html;
}

function renderWeeklyPortfolio(){
  const wkProjs=weeklyProjects();
  const prev=WEEKS[WEEKS.indexOf(CURWEEK)-1]||null;
  const agg=(week)=>{
    let vis=0,deals=0,signedU=0,signedAmt=0,n=0;
    wkProjs.forEach(name=>{
      const r=projWeek(name,week); if(!r)return;
      n++; vis+=r.visitors_week||0; deals+=r.deals_week||0;
      signedU+=r.signed_week_units||0; signedAmt+=r.signed_week_amount||0;
    });
    return {vis,deals,signedU,signedAmt,n};
  };
  const a=agg(CURWEEK), pa=prev?agg(prev):null;

  const kpis=[
    {k:'本週來人',v:fmtN(a.vis),u:'組',cur:a.vis,prev:pa?pa.vis:null,fmt:fmtN,mode:'good_up'},
    {k:'本週成交',v:fmtN(a.deals),u:'戶',cur:a.deals,prev:pa?pa.deals:null,fmt:fmtN,mode:'good_up'},
    {k:'本週簽約',v:fmtN(a.signedU),u:'戶',cur:a.signedU,prev:pa?pa.signedU:null,fmt:fmtN,mode:'good_up'},
    {k:'本週簽約金額',v:fmtW(a.signedAmt),u:'萬',cur:a.signedAmt,prev:pa?pa.signedAmt:null,fmt:fmtW,mode:'good_up'},
  ];
  let h=`<div class="wkkpis">`+kpis.map(c=>`
    <div class="wkkpi"><div class="k">${c.k}</div>
    <div class="v num">${c.v}<span class="u">${c.u}</span></div>
    ${wowSpan(c.cur,c.prev,c.fmt,c.mode)}</div>`).join('')+`</div>`;

  const rows=wkProjs.map(name=>{
    const r=projWeek(name,CURWEEK); if(!r)return null;
    return {name, vis:r.visitors_week||0, deals:r.deals_week||0, signedAmt:r.signed_week_amount||0};
  }).filter(Boolean).sort((x,y)=>y.deals-x.deals);

  h+=`<div class="wksec"><h2>各案本週表現 <span class="sub">${wkLabel(CURWEEK)}</span></h2>`;
  if(rows.length){
    h+=`<table><thead><tr><th style="text-align:left">建案</th><th>來人</th><th>成交</th><th>簽約金額(萬)</th></tr></thead><tbody>`+
      rows.map(r=>`<tr style="cursor:pointer" onclick="CURPROJ='${r.name}';renderWeekly()">
        <td style="text-align:left;font-weight:500">${r.name}</td>
        <td class="num">${fmtN(r.vis)}</td>
        <td class="num">${fmtN(r.deals)}</td>
        <td class="num">${fmtW(r.signedAmt)}</td></tr>`).join('')+`</tbody></table>`;
  } else {
    h+='<div style="color:var(--faint);font-size:13px;padding:14px 0">本週尚無任何建案回報。</div>';
  }
  h+=`</div>`;
  h+=`<div style="font-size:12px;color:var(--mut);background:var(--bluebg);border-radius:9px;padding:11px 14px;line-height:1.6">
    投組層的週彙總會隨各案單案週報上傳而自動補齊。目前已有單案週資料：<b>${wkProjs.join('、')||'—'}</b>。
    其餘建案上傳後，本頁的來人／成交／簽約週彙總會自動納入。</div>`;
  return h;
}

function renderWeeklyProject(name){
  const r=projWeek(name,CURWEEK);
  if(!r) return `<div class="wksec" style="color:var(--faint)">「${name}」於本週（${wkLabel(CURWEEK)}）尚無資料。</div>`;
  const pw=prevWeekFor(name,CURWEEK);
  const p=pw?projWeek(name,pw):null;
  const units=getUnits(name);
  const dehua=units?(units-(r.remain_units||0))/units*100:null;
  const dehuaPrev=(p&&units)?(units-(p.remain_units||0))/units*100:null;

  const kpis=[
    {k:'本週來人',v:fmtN(r.visitors_week),u:'組',cur:r.visitors_week,prev:p?p.visitors_week:null,fmt:fmtN,mode:'good_up'},
    {k:'本週來電',v:fmtN(r.calls_week),u:'通',cur:r.calls_week,prev:p?p.calls_week:null,fmt:fmtN,mode:'good_up'},
    {k:'本週成交',v:fmtN(r.deals_week),u:'戶',cur:r.deals_week,prev:p?p.deals_week:null,fmt:fmtN,mode:'good_up'},
    {k:'本週簽約',v:fmtN(r.signed_week_units),u:'戶',cur:r.signed_week_units,prev:p?p.signed_week_units:null,fmt:fmtN,mode:'good_up'},
    {k:'簽約金額',v:fmtW(r.signed_week_amount),u:'萬',cur:r.signed_week_amount,prev:p?p.signed_week_amount:null,fmt:fmtW,mode:'good_up'},
    {k:'本週補足',v:fmtN(r.deposit_week_units),u:'戶',cur:r.deposit_week_units,prev:p?p.deposit_week_units:null,fmt:fmtN,mode:'good_up'},
    {k:'去化率',v:dehua!=null?dehua.toFixed(1)+'%':'—',u:'',cur:dehua,prev:dehuaPrev,fmt:v=>v.toFixed(1)+'pp',mode:'good_up'},
    {k:'剩餘戶',v:fmtN(r.remain_units),u:'戶',cur:r.remain_units,prev:p?p.remain_units:null,fmt:fmtN,mode:'good_down'},
  ];
  let h=`<div class="wkkpis">`+kpis.map(c=>`
    <div class="wkkpi"><div class="k">${c.k}</div>
    <div class="v num">${c.v}${c.u?`<span class="u">${c.u}</span>`:''}</div>
    ${wowSpan(c.cur,c.prev,c.fmt,c.mode)}</div>`).join('')+`</div>`;

  const bud=[
    {k:'媒體執行',key:'budget_media'},{k:'人事管銷',key:'budget_personnel'},
    {k:'現場管銷',key:'budget_onsite'},{k:'公司管銷',key:'budget_company'},
    {k:'銷售獎金',key:'budget_bonus'},{k:'本週小計',key:'budget_total'},
  ];
  h+=`<div class="wksec"><h2>本週預算執行 <span class="sub">含週對比 · 萬元</span></h2><div class="wkrow6">`+
    bud.map(b=>`<div class="wkbudget"><div class="bl">${b.k}</div>
      <div class="bv num">${fmtW(r[b.key])}</div>
      ${wowSpan(r[b.key],p?p[b.key]:null,fmtW,'neutral')}</div>`).join('')+
    `</div>
     <div style="display:flex;gap:24px;margin-top:12px;font-size:12.5px;color:var(--mut)">
       <span>預算執行率 <b style="color:var(--ink)">${r.exec_rate_budget!=null?(r.exec_rate_budget*100).toFixed(1)+'%':'—'}</b></span>
       <span>銷售進度 <b style="color:var(--ink)">${r.exec_rate_sales!=null?(r.exec_rate_sales*100).toFixed(1)+'%':'—'}</b></span>
     </div></div>`;

  h+=`<div class="wksec"><h2>業主請款 <span class="sub">服務費（戶）</span></h2><div class="wkrow6">
     <div class="wkbudget"><div class="bl">可請</div><div class="bv num">${fmtN(r.billable_fee)}</div></div>
     <div class="wkbudget"><div class="bl">已請</div><div class="bv num">${fmtN(r.billed_fee)}</div>${wowSpan(r.billed_fee,p?p.billed_fee:null,fmtN,'good_up')}</div>
     <div class="wkbudget"><div class="bl">本月欲請款</div><div class="bv num">${fmtN(r.this_month_request)}</div></div>
   </div></div>`;

  if(r.salespeople&&r.salespeople.length){
    h+=`<div class="wksec"><h2>銷售人員累計</h2><div style="display:flex;flex-direction:column;gap:6px">`+
      r.salespeople.filter(s=>s.name).map(s=>{
        const cr=s.conv_rate!=null?(s.conv_rate>1?s.conv_rate.toFixed(1):(s.conv_rate*100).toFixed(1)):null;
        return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--line2);border-radius:8px;padding:8px 12px;font-size:12.5px">
          <span style="font-weight:500">${s.name}</span>
          <span style="color:var(--mut)">累計來人 <b>${s.cum_visitors!=null?s.cum_visitors:'—'}</b> · 成交 <b>${s.cum_deals!=null?s.cum_deals:'—'}</b>${cr?` · 轉換 <b style="color:var(--blue)">${cr}%</b>`:''}</span>
        </div>`;
      }).join('')+`</div></div>`;
  }

  const series=k=>WEEKS.map(w=>{const rr=projWeek(name,w);return rr?{w, v:rr[k]!=null?rr[k]:0}:null;}).filter(Boolean);
  h+=`<div class="wkgrid2">
    <div class="wksec"><h2>週來人趨勢 <span class="sub">近 12 週</span></h2>${buildWeekTrend(series('visitors_week'),CURWEEK,css('--blue'),fmtN)}</div>
    <div class="wksec"><h2>週成交趨勢 <span class="sub">近 12 週</span></h2>${buildWeekTrend(series('deals_week'),CURWEEK,css('--amber'),fmtN)}</div>
  </div>
  <div class="wkgrid2">
    <div class="wksec"><h2>週簽約金額趨勢 <span class="sub">萬元</span></h2>${buildWeekTrend(series('signed_week_amount'),CURWEEK,css('--pos'),fmtW)}</div>
    <div class="wksec"><h2>週預算小計趨勢 <span class="sub">萬元</span></h2>${buildWeekTrend(series('budget_total'),CURWEEK,css('--brand'),fmtW)}</div>
  </div>`;
  return h;
}

function buildWeekTrend(series, highlightWeek, color, fmt){
  const data=series.slice(-12);
  if(!data.length)return'<div style="font-size:11px;color:var(--faint);padding:8px">無資料</div>';
  const W=500,H=150,pl=14,pr=16,pt=18,pb=32;
  const vals=data.map(d=>d.v);
  const mx=Math.max(...vals.map(Math.abs),1);
  const n=data.length;
  const xs=i=>pl+(W-pl-pr)*(n>1?i/(n-1):0.5);
  const ys=v=>H-pb-(H-pt-pb)*(v/mx);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  for(let g=0;g<=3;g++){const y=pt+(H-pt-pb)*g/3;svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="${css('--line')}" stroke-width="1"/>`;}
  data.forEach((d,i)=>{
    if(n>8 && i%2!==0 && i!==n-1) return;
    svg+=`<text x="${xs(i)}" y="${H-8}" font-size="9" fill="${css('--mut')}" text-anchor="middle" font-family="Noto Sans TC">${rocDate(d.w).slice(-5)}</text>`;
  });
  svg+=`<polyline fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" points="${data.map((d,i)=>`${xs(i)},${ys(d.v)}`).join(' ')}"/>`;
  data.forEach((d,i)=>{
    const hl=d.w===highlightWeek;
    svg+=`<circle cx="${xs(i)}" cy="${ys(d.v)}" r="${hl?5:3}" fill="${color}"${hl?` stroke="${css('--card')}" stroke-width="2"`:''}/>`;
    if(hl) svg+=`<text x="${xs(i)}" y="${ys(d.v)-11}" font-size="10" fill="${color}" text-anchor="middle" font-weight="700" font-family="Noto Sans TC">${fmt(d.v)}</text>`;
  });
  return svg+'</svg>';
}
